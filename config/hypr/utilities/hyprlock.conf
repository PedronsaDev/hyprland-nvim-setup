# hyprlock.conf
# Lock screen styled with the provided color palette (regal navy + warm accents)
#
# Palette (CSS HEX):
# --regal-navy:    #252422
# --lemon-chiffon: #ebcba2
# --royal-gold:    #ef8354
# --sandy-brown:   #5c564e
# --tomato:        #ccc5b9
#
# Note: hyprlock uses 6-digit hex values in rgb(...) (no leading '#').
# This file uses only options compatible with common hyprlock builds.

# -----------------------
# Background
# -----------------------
background {
    monitor =
    color = rgb(0d3b66)   # regal navy - deep background
}

# -----------------------
# Large Clock / Time
# -----------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +\"%H:%M:%S\")"
    color = rgb(faf0ca)   # lemon chiffon - bright readable time
    font_size = 56
    font_family = Terminus, monospace

    position = 0, 140
    halign = center
    valign = center
}

# -----------------------
# Subtitle / Locked Message
# -----------------------
label {
    monitor =
    text = SECURE NODE // SYSTEM LOCKED
    color = rgb(f4d35e)   # royal gold - prominent accent
    font_size = 12
    font_family = Terminus, monospace

    position = 0, 90
    halign = center
    valign = center
}

# -----------------------
# Input Field (password)
# -----------------------
input-field {
    monitor =
    size = 420, 48
    outline_thickness = 2

    # Dots appearance (visual only)
    dots_size = 0.30
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = 6

    # Colors:
    # - outer_color: border (royal gold)
    # - inner_color: field background (sandy brown, muted)
    # - font_color: typing text (lemon chiffon)
    outer_color = rgb(f4d35e)
    inner_color = rgb(ee964b)
    font_color = rgb(faf0ca)

    # Placeholder text
    fade_on_empty = false
    placeholder_text = > ENTER PASSWORD

    # Error state: tomato border and message
    fail_color = rgb(f95738)
    fail_text = ACCESS DENIED

    position = 0, -30
    halign = center
    valign = center
}

# -----------------------
# Secondary hint text (e.g., caps lock)
# -----------------------
label {
    monitor =
    text = Caps Lock / Num Lock indicators will appear here
    color = rgb(faf0ca)
    font_size = 10
    font_family = Terminus, monospace

    position = 0, -80
    halign = center
    valign = center
}

# -----------------------
# Thin accent underline below input
# -----------------------
label {
    monitor =
    text =
    color = rgb(f4d35e)
    font_size = 1

    position = 0, -8
    halign = center
    valign = center
}

# ~/.config/yazi/theme.toml

[mgr]
cwd = { fg = "#8a9a7b" } # Accent

# Find
find_keyword  = { fg = "#c4b28a" } # Yellow
find_position = { fg = "#a292a3", bg = "reset" } # Magenta

[indicator]
parent  = { fg = "#181616", bg = "#727169" }
current = { fg = "#181616", bg = "#8a9a7b", bold = true }
preview = { underline = true }

# Marker
marker_copied   = { fg = "#8a9a7b", bg = "#8a9a7b" } # Green
marker_cut      = { fg = "#c4746e", bg = "#c4746e" } # Red
marker_selected = { fg = "#8ea4a2", bg = "#8ea4a2" } # Cyan

[border]
type = "plain"
style  = { fg = "#727169" }

[tabs]
# Tab - Now uses Accent for the active tab
active   = { fg = "#181616", bg = "#8a9a7b" }
inactive = { fg = "#c5c9c5", bg = "#727169" }



[status]
# Flat rectangular spacers to match our retro look (no rounded capsules)
sep_left  = { open = " [", close = "] " }
sep_right = { open = " [", close = "] " }

# Progress
progress_label  = { fg = "#c5c9c5", bold = true }
progress_normal = { fg = "#8ba4b0", bg = "#727169" }
progress_error  = { fg = "#c4746e", bg = "#727169" }

# Permissions
perm_sep   = { fg = "#727169" }
perm_type  = { fg = "#8ba4b0" }
perm_read  = { fg = "#c4b28a" }
perm_write = { fg = "#c4746e" }
perm_exec  = { fg = "#8a9a7b" }

[mode]
normal_main = { fg = "#181616", bg = "#8a9a7b", bold = true }
normal_alt  = { fg = "#c5c9c5", bg = "#727169" }

select_main = { fg = "#181616", bg = "#8ea4a2", bold = true }
select_alt  = { fg = "#c5c9c5", bg = "#727169" }

unset_main  = { fg = "#181616", bg = "#a292a3", bold = true }
unset_alt   = { fg = "#c5c9c5", bg = "#727169" }

[select]
border   = { fg = "#727169" }
active   = { fg = "#8a9a7b", bold = true }
inactive = { fg = "#c5c9c5" }

[input]
border   = { fg = "#727169" } # Muted border
title    = { fg = "#8a9a7b", bold = true }
value    = { fg = "#c5c9c5", bg = "#181616" } # Explicit dark bg, light text (Fixes invisible text)
selected = { fg = "#181616", bg = "#8a9a7b", bold = true } # Dark text on Accent bg

[completion]
border   = { fg = "#727169" } # Muted border
active   = { fg = "#181616", bg = "#8a9a7b", bold = true } # Dark text on Accent bg
inactive = { fg = "#c5c9c5", bg = "#181616" }

[which]
mask            = { bg = "#181616" } # Explicit dark background to prevent bleed-through
bin             = { fg = "#8a9a7b", bold = true } # The key to press (Accent)
rest            = { fg = "#c5c9c5" } # The action description (White)
desc            = { fg = "#a292a3" }
separator       = " -> " # Raw ASCII arrow
separator_style = { fg = "#727169" }

[filetype]
rules = [
    # Directories
    { mime = "inode/directory", fg = "#8a9a7b" }, # Accent

    # Executables and Scripts
    { mime = "application/*executable", fg = "#8a9a7b" }, # Green
    { url = "*.sh", fg = "#8a9a7b" },
    { url = "*.py", fg = "#8a9a7b" },
    { url = "*.lua", fg = "#8a9a7b" },

    # Archives
    { mime = "application/zip", fg = "#a292a3" }, # Magenta
    { mime = "application/gzip", fg = "#a292a3" },
    { mime = "application/x-tar", fg = "#a292a3" },
    { mime = "application/x-bzip*", fg = "#a292a3" },
    { mime = "application/x-7z-compressed", fg = "#a292a3" },

    # Fallback
    { url = "*/", fg = "#8a9a7b" }, # Directories
    { url = "*", fg = "#c5c9c5" }, # Default foreground
]

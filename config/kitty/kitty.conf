# Kitty Terminal Configuration

# Font Configuration
font_family      Terminess Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Window Layout
window_padding_width 15

# Shell Configuration
shell zsh

# Scrollback
scrollback_lines 10000

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Terminal Bell
enable_audio_bell no

# Remote Control (for live theme reloading)
allow_remote_control yes

# Theme Integration
include theme.conf

# TMUX Configuration - Retro UNIX Style

# Set prefix to Ctrl-a (more comfortable than Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Snappy response time (no delay after escape)
set -s escape-time 0

# Enable mouse support
set -g mouse on

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easy split pane keybinds
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Dynamic window title renaming
set-window-option -g automatic-rename on
set-option -g set-titles on

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Tmux config reloaded!"

# Load color scheme generated by theme engine
if-shell "[ -f ~/.config/tmux/theme.conf ]" "source-file ~/.config/tmux/theme.conf"
